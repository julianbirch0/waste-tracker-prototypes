<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WasteTracker Prototype - Hello World</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <p class="eyebrow">WasteTracker Prototype</p>
      <h1>Hello World</h1>
      <p id="message">Your first GitHub-based prototype is alive.</p>

      <button id="helloButton" type="button">Click me</button>

      <p class="status">
        Button clicked <span id="clickCount">0</span> times.
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
