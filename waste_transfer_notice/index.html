<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waste Transfer Notice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel">
      <h1>Waste Transfer Notice</h1>

      <div class="control-group">
        <label for="logoFile1">Logo file 1 - Header</label>
        <input type="file" id="logoFile1" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp">
      </div>

      <div class="control-group">
        <label for="logoFile2">Logo file 2 - Footer</label>
        <input type="file" id="logoFile2" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp">
      </div>

      <div class="control-group">
        <label for="jsonInput">Pasted JSON</label>
        <textarea id="jsonInput" spellcheck="false"></textarea>
      </div>

      <div class="button-row">
        <button id="renderButton" type="button">Render</button>
        <button id="resetButton" type="button">Reset sample</button>
        <button id="downloadButton" type="button">Download</button>
        <button id="gridToggleButton" type="button">Show grid</button>
      </div>

      <div id="measurementReadout" class="measurement-readout">Grid off.</div>
      <div id="errorMessage" class="error-message"></div>
    </aside>

    <main class="preview-panel">
      <div id="documentPreview"></div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    if (typeof sampleJson !== "undefined") {
      sampleJson.document.footer_left = "";
      sampleJson.document.footer_right = "Page 1 of 1";
      sampleJson.footer.wasteTrackerStrapline = "Powered by Mywastetracker";
      sampleJson.footer.website = "www.mywastetracker.co.uk";
    }

    function renderFooter(data) {
      var strapline = getValue(data, 'footer.wasteTrackerStrapline') || getValue(data, 'footer.wastetracker_stapline') || 'Powered by Mywastetracker';
      var website = getValue(data, 'footer.website') || 'www.mywastetracker.co.uk';
      var footerLeft = getValue(data, 'document.footer_left');
      var footerRight = getValue(data, 'document.footer_right') || 'Page 1 of 1';

      return '' +
        '<footer class="document-footer">' +
          '<div class="footer-logo-box">' + renderLogo(logo2DataUrl, 'Logo file 2') + '</div>' +
          '<div class="footer-strapline">' +
            '<div class="footer-strapline-main">' + escapeHtml(strapline) + '</div>' +
            '<div>' + escapeHtml(website) + '</div>' +
          '</div>' +
        '</footer>' +
        '<div class="footer-line">' +
          '<span>' + escapeHtml(footerLeft) + '</span>' +
          '<span>' + escapeHtml(footerRight) + '</span>' +
        '</div>';
    }
  </script>
</body>
</html>
