<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar Filter Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="prototype-shell">
    <section class="widget" aria-label="Calendar filter prototype">
      <div id="filterCaption" class="filter-caption">No filter set, all dates shown</div>

      <div class="button-row">
        <button id="openFilterButton" class="primary-button" type="button">Set date filter</button>
        <button id="clearFilterButton" class="secondary-button" type="button">Clear filter</button>
      </div>

      <section id="filterPanel" class="filter-panel hidden" aria-labelledby="filterTitle">
        <div class="panel-header">
          <h2 id="filterTitle">Date filter</h2>
          <button id="closePanelButton" class="icon-button" type="button" aria-label="Close date filter">×</button>
        </div>

        <div class="tabs" role="tablist" aria-label="Date filter tabs">
          <button id="presetsTabButton" class="tab-button active" type="button" role="tab" aria-selected="true" aria-controls="presetsTab">Presets</button>
          <button id="customTabButton" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="customTab">Custom</button>
        </div>

        <div id="presetsTab" class="tab-panel" role="tabpanel" aria-labelledby="presetsTabButton">
          <div class="preset-list">
            <button class="preset-button" type="button" data-preset="today">Today</button>
            <button class="preset-button" type="button" data-preset="tomorrow">Tomorrow</button>
            <button class="preset-button" type="button" data-preset="this-week">This week</button>
            <button class="preset-button" type="button" data-preset="next-week">Next week</button>
            <button class="preset-button" type="button" data-preset="this-month">This month</button>
          </div>
        </div>

        <div id="customTab" class="tab-panel hidden" role="tabpanel" aria-labelledby="customTabButton">
          <fieldset class="mode-options">
            <legend>Choose custom filter type</legend>

            <label>
              <input type="radio" name="customMode" value="single" checked>
              Single date
            </label>

            <label>
              <input type="radio" name="customMode" value="range">
              Date range
            </label>
          </fieldset>

          <p id="customInstruction" class="instruction">Select a date.</p>

          <div class="calendar">
            <div class="calendar-header">
              <button id="previousMonthButton" class="calendar-nav-button" type="button" aria-label="Previous month">‹</button>
              <div id="calendarMonthLabel" class="calendar-month-label"></div>
              <button id="nextMonthButton" class="calendar-nav-button" type="button" aria-label="Next month">›</button>
            </div>

            <div class="calendar-grid calendar-weekdays" aria-hidden="true">
              <div>Mon</div>
              <div>Tue</div>
              <div>Wed</div>
              <div>Thu</div>
              <div>Fri</div>
              <div>Sat</div>
              <div>Sun</div>
            </div>

            <div id="calendarDays" class="calendar-grid calendar-days"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
