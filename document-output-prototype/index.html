<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WasteTracker Document Output Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel">
      <h1>Document Output Prototype</h1>

      <div class="control-group">
        <label for="logoFile1">Logo file 1 - Header</label>
        <input type="file" id="logoFile1" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp">
      </div>

      <div class="control-group">
        <label for="logoFile2">Logo file 2 - Footer</label>
        <input type="file" id="logoFile2" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp">
      </div>

      <div class="control-group">
        <label for="jsonInput">Pasted JSON</label>
        <textarea id="jsonInput" spellcheck="false"></textarea>
      </div>

      <div class="button-row">
        <button id="renderButton" type="button">Render</button>
        <button id="resetButton" type="button">Reset sample</button>
        <button id="downloadButton" type="button">Download</button>
      </div>

      <div id="errorMessage" class="error-message"></div>
    </aside>

    <main class="preview-panel">
      <div id="documentPreview"></div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
